<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Recommender</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0f172a;
    color:white;
}

.navbar{
    background:#14b8a6;
}

.hero{
    padding:60px 0;
    text-align:center;
}

.hero h1{
    font-size:3rem;
    font-weight:700;
}

.book-card{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
    height:100%;
}

.book-card:hover{
    transform:translateY(-10px);
}

.book-card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.book-info{
    padding:15px;
}

.book-title{
    font-weight:bold;
    font-size:17px;
}

.book-author{
    color:#cbd5e1;
}

.stat{
    color:#94a3b8;
    font-size:14px;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="/">
📚 Book Recommender
</a>

<div class="navbar-nav ms-auto">
<a class="nav-link text-white" href="/">Home</a>
<a class="nav-link text-white" href="/recommend">Recommend</a>
</div>
</div>
</nav>

<div class="hero">
<div class="container">
<h1>Top 50 Books</h1>
<p>Most Popular Books Recommended By Readers</p>
</div>
</div>

<div class="container mb-5">

<div class="row g-4">

{% for i in range(book_name|length) %}

<div class="col-md-3">

<div class="book-card">

<img src="{{ image[i] }}">

<div class="book-info">

<div class="book-title">
{{ book_name[i] }}
</div>

<div class="book-author">
{{ author[i] }}
</div>

<div class="stat mt-2">
⭐ Rating : {{ rating[i] }}
</div>

<div class="stat">
👥 Votes : {{ votes[i] }}
</div>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
