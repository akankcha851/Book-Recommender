<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Recommendations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0f172a;
    color:white;
}

.navbar{
    background:#14b8a6;
}

.hero{
    padding:70px 0;
    text-align:center;
}

.hero h1{
    font-size:3rem;
    font-weight:700;
}

.search-box{
    max-width:700px;
    margin:auto;
}

.book-card{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
    height:100%;
}

.book-card:hover{
    transform:translateY(-10px);
}

.book-card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.book-info{
    padding:15px;
}

.book-title{
    font-size:18px;
    font-weight:700;
}

.book-author{
    color:#cbd5e1;
}

.btn-search{
    background:#14b8a6;
    border:none;
}

.btn-search:hover{
    background:#0f9e90;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="/">
📚 Book Recommender
</a>

<div class="navbar-nav ms-auto">
<a class="nav-link text-white" href="/">Home</a>
<a class="nav-link text-white" href="/recommend">Recommend</a>
</div>

</div>

</nav>

<section class="hero">

<div class="container">

<h1>Find Similar Books</h1>

<form action="/recommend_books" method="post" class="search-box">

<input
type="text"
name="user_input"
class="form-control form-control-lg"
placeholder="Enter exact book name">

<button
type="submit"
class="btn btn-search btn-lg text-white mt-3">
Get Recommendations
</button>

</form>

</div>

</section>

<div class="container mb-5">

<div class="row g-4">

{% if data %}

{% for i in data %}

<div class="col-md-3">

<div class="book-card">

<img src="{{ i[2] }}">

<div class="book-info">

<div class="book-title">
{{ i[0] }}
</div>

<div class="book-author">
{{ i[1] }}
</div>

</div>

</div>

</div>

{% endfor %}

{% endif %}

</div>

</div>

</body>

</html>
